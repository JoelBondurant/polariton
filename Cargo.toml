[package]
name = "polariton"
version = "0.1.0"
edition = "2024"
resolver = "3"
authors = ["Joel Bondurant"]
description = "A strong coupling of data and visualization."


[dependencies]
async-trait = "0.1.89"
bytes = "1.11.1"
iced = { version = "0.14.0", features = ["advanced", "canvas", "tokio"] }
iced-code-editor = "0.3.6"
polars = { version = "0.53.0", features = ["lazy", "parquet", "sql"] }
sqlparser = "0.61.0"
tokio = { version = "1.49.0", features = ["full"] }
tokio-postgres = "0.7.16"
tokio-rusqlite = { version = "0.7.0", features = ["bundled"] }
tokio-stream = "0.1.18"


[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = 0
